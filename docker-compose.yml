services:
  db:
    image: postgres:16
    container_name: wedding_planner_db
    environment:
      POSTGRES_USER: wedding
      POSTGRES_PASSWORD: wedding
      POSTGRES_DB: wedding_planner
    ports:
      - "5432:5432"
    volumes:
      - wedding_planner_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wedding -d wedding_planner"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: wedding_planner_app
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+psycopg://wedding:wedding@db:5432/wedding_planner
      LOG_FORMAT: json
      LOG_LEVEL: INFO
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy

volumes:
  wedding_planner_data:
