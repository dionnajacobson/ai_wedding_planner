services:
  db:
    image: postgres:16
    container_name: wedding_planner_db
    environment:
      POSTGRES_USER: wedding
      POSTGRES_PASSWORD: wedding
      POSTGRES_DB: wedding_planner
    ports:
      - "5432:5432"
    volumes:
      - wedding_planner_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wedding -d wedding_planner"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  wedding_planner_data:
