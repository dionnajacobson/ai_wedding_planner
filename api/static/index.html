<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Wedding Planner</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500&family=Outfit:wght@300;400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <div class="backdrop"></div>
    <main class="app">
      <header class="header">
        <p class="eyebrow">Your planning companion</p>
        <h1>Wedding Planner</h1>
        <p class="subtitle">
          Ask about timelines, vendors, budgets, and guest lists. Every reply is saved to your session.
        </p>
      </header>

      <section class="chat-panel" aria-label="Chat">
        <div id="messages" class="messages" role="log" aria-live="polite"></div>

        <div id="status" class="status" hidden>
          <span class="status-dot"></span>
          <span id="status-text">Starting your session…</span>
        </div>

        <form id="chat-form" class="composer" autocomplete="off">
          <label class="sr-only" for="message-input">Message</label>
          <textarea
            id="message-input"
            rows="1"
            placeholder="Ask about venues, timelines, or your guest list…"
            disabled
          ></textarea>
          <button type="submit" id="send-button" disabled aria-label="Send message">
            Send
          </button>
        </form>
      </section>
    </main>

    <script src="/static/app.js"></script>
  </body>
</html>
